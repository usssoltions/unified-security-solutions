<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />

    <!-- Responsive viewport — prevents iOS zoom on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Standalone mode — keeps app alive like a native app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SecureGuard" />

    <!-- Theme color — matches app dark background -->
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Prevent caching stale assets -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <!-- Prevent phone number / address detection interfering with UI -->
    <meta name="format-detection" content="telephone=no, address=no, email=no" />

    <!-- Keep connections alive — critical for WebSocket / real-time push -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />

    <!-- Preconnect to OneSignal CDN for faster SW load -->
    <link rel="preconnect" href="https://cdn.onesignal.com" />
    <link rel="dns-prefetch" href="https://cdn.onesignal.com" />
    <link rel="dns-prefetch" href="https://onesignal.com" />

    <title>SecureGuard</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple touch icon (USS branded) -->
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/690fd37d10984f1f26cedab8/1f03ecb8e_generated_image.png" />
  </head>
  <body>
    <!-- Force-clear ALL service workers and caches before React loads.
         This prevents cached broken JS chunks from causing React hook errors. -->
    <script>
      (function() {
        var CACHE_VERSION = 'v4';
        var cleared = sessionStorage.getItem('cache_cleared_v2');
        
        if (cleared !== CACHE_VERSION) {
          sessionStorage.setItem('cache_cleared_v2', CACHE_VERSION);
          
          // Unregister ALL service workers (including /sw.js) to fully reset
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(reg) { reg.unregister(); });
            });
          }
          
          // Clear all caches unconditionally
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { caches.delete(k); });
            });
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
